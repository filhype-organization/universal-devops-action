name: Code Quality Checks
description: 'Run linting and code quality checks'

inputs:
  sql_lint_path:
    description: 'Path to SQL files for linting'
    required: false
    default: 'models'
  sql_lint_config:
    description: 'Path to SQLFluff config file'
    required: false
    default: '.sqlfluff'
  sql_lint_version:
    description: 'SQLFluff version'
    required: false
    default: '3.3.1'
  github_token:
    description: 'GitHub token for authentication'
    required: true

runs:
  using: composite
  steps:
    - name: MegaLinter
      id: megalinter
      uses: oxsecurity/megalinter@v9
      continue-on-error: true
      env:
        GITHUB_TOKEN: ${{ inputs.github_token }}
        VALIDATE_ALL_CODEBASE: false
        REPORT_OUTPUT_FOLDER: megalinter-reports
        LOG_LEVEL: INFO
        FILTER_REGEX_EXCLUDE: '(\.git/|node_modules/|\.venv/|__pycache__/|dist/|build/|target/)'
        DEFAULT_BRANCH: ${{ github.event.repository.default_branch || 'main' }}
        PARALLEL_PROCESS_NUMBER: 4
        SHOW_ELAPSED_TIME: true
        FILEIO_REPORTER: false
        UPDATED_SOURCES_REPORTER: false
        ENABLE_LINTERS: >-
          ACTION_ACTIONLINT,YAML_PRETTIER,YAML_V8R,JSON_JSONLINT,JSON_PRETTIER,
          JAVASCRIPT_ES,TYPESCRIPT_ES,PYTHON_FLAKE8,PYTHON_BLACK,JAVA_CHECKSTYLE,
          MARKDOWN_MARKDOWNLINT,DOCKERFILE_HADOLINT,SPELL_LYCHEE,GIT_GIT_DIFF,
          REPOSITORY_DUSTILOCK,REPOSITORY_SYFT

    - name: Run SQL Lint
      id: sql_lint
      if: hashFiles('**/*.sql')
      uses: yu-iskw/action-sqlfluff@v4
      continue-on-error: true
      with:
        github_token: ${{ inputs.github_token }}
        reporter: github-pr-review
        sqlfluff_version: ${{ inputs.sql_lint_version }}
        sqlfluff_command: "fix"
        config: "${{ github.workspace }}/${{ inputs.sql_lint_config }}"
        paths: "${{ github.workspace }}/${{ inputs.sql_lint_path }}"

    - name: MegaLinter summary
      if: steps.megalinter.outcome == 'failure'
      shell: bash
      run: echo "::warning::MegaLinter detected issues — check the megalinter-reports folder."

    - name: SQLFluff summary
      if: steps.sql_lint.outcome == 'failure'
      shell: bash
      run: echo "::warning::SQLFluff detected issues in SQL files."
